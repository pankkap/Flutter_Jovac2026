<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Flutter WebView Demo</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: #1976D2;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            margin: auto;
            box-shadow: 0 0 10px #cccccc;
        }

        button {
            padding: 12px 20px;
            background: #1976D2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>

    <script>
        function showMessage() {
            document.getElementById("msg").innerHTML =
                "🎉 JavaScript Executed Successfully!";
        }
    </script>

</head>

<body>

    <div class="card">

        <h1>Flutter WebView Demo</h1>

        <h2>WebView is Working ✅</h2>

        <p>This HTML page is loaded from the assets folder.</p>

        <button onclick="showMessage()">
            Click Me
        </button>

        <h2 id="msg" style="color:green"></h2>

    </div>

</body>

</html>
